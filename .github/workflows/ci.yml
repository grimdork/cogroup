name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    env:
      # Opt into Node.js 24 for JavaScript-based actions to avoid deprecation warnings
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        # Use go.mod as the dependency file (go.sum may be absent in some branches)
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.mod') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Install staticcheck
      run: |
        go install honnef.co/go/tools/cmd/staticcheck@latest
        # Use the recommended $GITHUB_PATH file to update PATH instead of the deprecated add-path command
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Run tests
      run: go test ./... -v

    - name: Run go vet
      run: go vet ./...

    - name: Run staticcheck
      run: staticcheck ./...

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-bench-${{ hashFiles('**/go.mod') }}
        restore-keys: |
          ${{ runner.os }}-go-bench-

    - name: Run benchmarks
      run: |
        # Run benchmarks and save results; keep reasonable timeout
        go test -bench=. -benchmem ./... > bench-results.txt
        echo "Benchmarks complete; results at bench-results.txt"

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: bench-results
        path: bench-results.txt
