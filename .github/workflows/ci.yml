name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Opt into Node.js 24 for JavaScript-based actions to avoid deprecation warnings
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        # Use go.mod as the dependency file (go.sum may be absent in some branches)
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.mod') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Install staticcheck
      run: |
        go install honnef.co/go/tools/cmd/staticcheck@latest
        # Use the recommended $GITHUB_PATH file to update PATH instead of the deprecated add-path command
        echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

    - name: Run tests
      run: go test ./... -v

    - name: Run go vet
      run: go vet ./...

    - name: Run staticcheck
      run: staticcheck ./...
